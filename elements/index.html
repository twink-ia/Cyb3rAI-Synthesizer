<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyb3rAI | Lua Script Synthesizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* SEU CSS ORIGINAL AQUI - MANTÉM TUDO IGUAL */
        :root {
            --neon-blue: #00eaff;
            --neon-purple: #ae00ff;
            --dark-bg: #0d0d10;
            --card-bg: #1a1a20;
            --text-light: #e0e0e0;
            --text-dark: #888;
            --border-glow: rgba(0, 234, 255, 0.4);
            --gradient-1: #00eaff;
            --gradient-2: #ae00ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
            color: var(--text-light);
        }

        body {
            background-color: var(--dark-bg);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            perspective: 1000px;
        }

        .particles-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--neon-blue) 0%, var(--neon-purple) 100%);
            border-radius: 50%;
            opacity: 0.05;
            animation: particleFloat 15s infinite ease-in-out;
            box-shadow: 0 0 15px var(--neon-blue), 0 0 25px var(--neon-purple);
        }
        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0.05; }
            50% { transform: translate(100vw, 50vh) scale(1.2); opacity: 0.1; }
            100% { transform: translate(0, 100vh) scale(0.8); opacity: 0.05; }
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: rgba(26, 26, 32, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 234, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0, 234, 255, 0.1), 0 0 100px rgba(174, 0, 255, 0.08);
            animation: fadeInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            position: relative;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-purple);
            margin-bottom: 10px;
            letter-spacing: 2px;
            position: relative;
            animation: flickerText 1.5s infinite alternate;
        }
        @keyframes flickerText {
            0%, 100% { opacity: 1; text-shadow: 0 0 8px var(--neon-blue); }
            50% { opacity: 0.9; text-shadow: 0 0 12px var(--neon-purple), 0 0 25px var(--neon-blue); }
        }
        header p {
            color: var(--text-dark);
            font-size: 1.05rem;
            font-family: 'Share Tech Mono', monospace;
            margin-top: 15px;
        }
        .header-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--neon-blue), transparent);
            margin: 10px auto;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--neon-blue);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 234, 255, 0.3);
            font-family: 'Share Tech Mono', monospace;
        }
        textarea {
            width: 100%;
            background: var(--dark-bg);
            border: 1px solid rgba(0, 234, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            color: var(--text-light);
            font-size: 0.95rem;
            resize: none;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 0 8px rgba(0, 234, 255, 0.1);
            font-family: 'Share Tech Mono', monospace;
        }
        textarea:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 15px var(--neon-blue);
        }
        #userInput { height: 120px; }
        #aiOutput {
            height: 280px;
            background: #08080a;
            color: var(--neon-blue);
            line-height: 1.6;
        }

        .btn-generate {
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.5s ease;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 234, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: neonPulse 2s infinite alternate;
            font-family: 'Orbitron', sans-serif;
        }
        .btn-generate:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 30px var(--neon-blue), 0 0 50px var(--neon-purple);
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue));
        }
        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
        }
        @keyframes neonPulse {
            0% { box-shadow: 0 0 15px var(--neon-blue), 0 0 25px var(--neon-purple); }
            100% { box-shadow: 0 0 25px var(--neon-blue), 0 0 40px var(--neon-purple); }
        }

        .copy-container {
            position: absolute;
            top: 45px;
            right: 15px;
            z-index: 10;
        }
        .btn-copy {
            background: rgba(0, 234, 255, 0.1);
            border: 1px solid rgba(0, 234, 255, 0.3);
            color: var(--neon-blue);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, box-shadow 0.3s;
            text-transform: uppercase;
            font-family: 'Share Tech Mono', monospace;
        }
        .btn-copy:hover {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-dark);
            font-size: 0.8rem;
            font-family: 'Share Tech Mono', monospace;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loading-animation {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(0, 234, 255, 0.2);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 234, 255, 0.5);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            font-family: 'Share Tech Mono', monospace;
        }
        .error-message {
            color: #ff4444;
            margin-top: 10px;
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
        }
    </style>
</head>
<body>

    <div class="particles-background" id="particles-bg"></div>

    <div class="container">
        <header>
            <h1>Cyb3rAI Synthesizer</h1>
            <div class="header-line"></div>
            <p>Sintetize scripts Lua de alta performance para o seu projeto.</p>
        </header>

        <div class="input-group">
            <label for="userInput">ENTRADA DO CÓDIGO</label>
            <textarea id="userInput" placeholder="Descreva o script Lua que você precisa..."></textarea>
        </div>

        <button class="btn-generate" onclick="generateScript()" id="generateBtn">SINTETIZAR CÓDIGO</button>

        <div class="input-group">
            <label for="aiOutput">SAÍDA DO CÓDIGO</label>
            <div class="copy-container">
                <button class="btn-copy" onclick="copyToClipboard()">COPIAR</button>
            </div>
            <textarea id="aiOutput" readonly placeholder="O script Lua gerado pela Cyb3rAI aparecerá aqui..."></textarea>
        </div>
        
        <div id="errorMessage" class="error-message"></div>

        <footer>
            // Cyb3rAI Engine v2.0 - Optimized for Lua Syntax //
        </footer>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-animation"></div>
        <div class="loading-text">SINTETIZANDO CÓDIGO...</div>
    </div>

    <script>
        // Criação de Partículas
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            document.getElementById('particles-bg').appendChild(particle);

            const size = Math.random() * 5 + 5;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;

            const duration = Math.random() * 10 + 10;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `-${Math.random() * duration}s`;
        }
        for (let i = 0; i < 50; i++) {
            createParticle();
        }

        // Função de Geração com API real
        async function generateScript() {
            const userInput = document.getElementById('userInput');
            const aiOutput = document.getElementById('aiOutput');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const generateBtn = document.getElementById('generateBtn');
            const errorMsg = document.getElementById('errorMessage');

            if (userInput.value.trim() === "") {
                alert("Insira sua requisição para sintetizar o código.");
                return;
            }

            // Limpa mensagens de erro anteriores
            errorMsg.textContent = '';
            
            // Desabilita o botão durante o processamento
            generateBtn.disabled = true;
            loadingOverlay.classList.add('active');

            try {
                // Faz a requisição para o backend
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: userInput.value })
                });

                const data = await response.json();

                if (response.ok && data.response) {
                    aiOutput.value = data.response;
                    userInput.value = ""; // Limpa entrada
                } else {
                    throw new Error(data.error || 'Erro ao gerar script');
                }
            } catch (error) {
                errorMsg.textContent = 'Erro: ' + error.message;
                aiOutput.value = '-- Erro ao sintetizar código. Tente novamente. --';
            } finally {
                loadingOverlay.classList.remove('active');
                generateBtn.disabled = false;
            }
        }

        // Função de Copiar
        function copyToClipboard() {
            const copyText = document.getElementById("aiOutput");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerText;
            btn.innerText = "COPIADO!";
            btn.style.background = "var(--neon-blue)";
            btn.style.color = "var(--dark-bg)";
            btn.style.boxShadow = "0 0 15px var(--neon-blue)";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "rgba(0, 234, 255, 0.1)";
                btn.style.color = "var(--neon-blue)";
                btn.style.boxShadow = "none";
            }, 2000);
        }

        // Permite enviar com Enter (Shift+Enter para quebra de linha)
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateScript();
            }
        });
    </script>
</body>
      </html>
